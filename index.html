<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Date Calculator</title>
    <style>
        :root {
            /* Gasoline Theme Colors */
            --primary: #f59e0b;     /* Amber / Fuel Light Yellow */
            --bg: #1e293b;          /* Dark Asphalt */
            --card-bg: #0f172a;     /* Dashboard Black */
            --text: #f8fafc;        /* Bright White */
            --input-bg: #334155;    /* Dark Input Fields */
            --input-border: #475569;
            --success: #10b981;     /* Go / Refuel Green */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            /* Subtle diagonal stripes to look like a construction/warning zone */
            background-image: repeating-linear-gradient(
                45deg,
                #1e293b,
                #1e293b 10px,
                #1a2433 10px,
                #1a2433 20px
            );
        }
        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            border-top: 5px solid var(--primary); /* Amber accent at the top */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
        }
        h2 { 
            margin-top: 0; 
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #cbd5e1;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--input-bg);
            border: 2px solid var(--input-border);
            color: var(--text);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1.1rem;
            font-weight: bold;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary); /* Turns amber when typing */
        }
        /* Number plate specific styling */
        #plate {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: monospace;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background-color: var(--input-bg);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid var(--input-border);
        }
        input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: var(--primary);
        }
        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: rgba(16, 185, 129, 0.1); /* Faint green background */
            border: 2px solid var(--success); /* Neon green border */
            border-radius: 6px;
            display: none; 
            text-align: center;
        }
        .result-label {
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .date-display {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--success);
            margin: 0.75rem 0;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); /* Slight neon glow */
        }
        #quotaOutput {
            display: inline-block;
            background-color: var(--primary);
            color: var(--card-bg);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⛽ Fuel Tracker</h2>
    
    <div class="form-group">
        <label for="plate">Vehicle Number Plate</label>
        <input type="text" id="plate" placeholder="WP CAA-1234" autocomplete="off">
    </div>

    <div class="form-group">
        <label for="type">Vehicle Type</label>
        <select id="type">
            <option value="car">Car / Jeep / Van</option>
            <option value="bike">Motorcycle / Scooter</option>
        </select>
    </div>

    <div class="form-group checkbox-group">
        <input type="checkbox" id="refueled">
        <label for="refueled" style="margin: 0; color: var(--text);">Already refueled this week</label>
    </div>

    <div class="result" id="resultBox">
        <div class="result-label">Next Available Date</div>
        <div class="date-display" id="dateOutput">-</div>
        <div id="quotaOutput">Quota: -</div>
    </div>
</div>

<script>
    const plateInput = document.getElementById('plate');
    const typeInput = document.getElementById('type');
    const refueledInput = document.getElementById('refueled');
    const resultBox = document.getElementById('resultBox');
    const dateOutput = document.getElementById('dateOutput');
    const quotaOutput = document.getElementById('quotaOutput');

    plateInput.addEventListener('input', calculateDate);
    typeInput.addEventListener('change', calculateDate);
    refueledInput.addEventListener('change', calculateDate);

    function calculateDate() {
        const plate = plateInput.value.trim();
        const type = typeInput.value;
        const hasRefueled = refueledInput.checked;

        const match = plate.match(/\d(?=[^\d]*$)/);
        
        if (!match) {
            resultBox.style.display = 'none';
            return;
        }

        resultBox.style.display = 'block';

        const lastDigit = parseInt(match[0], 10);
        const isUserOdd = lastDigit % 2 !== 0; 

        let checkDate = new Date(); 
        checkDate.setHours(0, 0, 0, 0); 

        if (hasRefueled) {
            let daysUntilSunday = 7 - checkDate.getDay();
            checkDate.setDate(checkDate.getDate() + daysUntilSunday);
        }

        while (true) {
            const dateNum = checkDate.getDate();
            const isDateOdd = dateNum % 2 !== 0;

            if (isUserOdd === isDateOdd) {
                break;
            }
            checkDate.setDate(checkDate.getDate() + 1);
        }

        const quota = type === 'car' ? '15 Liters' : '5 Liters';
        const options = { weekday: 'long', month: 'short', day: 'numeric' }; 
        
        dateOutput.textContent = checkDate.toLocaleDateString(undefined, options);
        quotaOutput.textContent = `Allowed Quota: ${quota}`;
    }
</script>

</body>
</html>
