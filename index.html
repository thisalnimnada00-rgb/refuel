<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Date Calculator</title>
    <style>
        :root {
            var(--primary): #f59e0b;
            --primary: #f59e0b;     
            --bg: #1e293b;          
            --card-bg: #0f172a;     
            --text: #f8fafc;        
            --input-bg: #334155;    
            --input-border: #475569;
            --success: #10b981;     
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: repeating-linear-gradient(
                45deg,
                #1e293b,
                #1e293b 10px,
                #1a2433 10px,
                #1a2433 20px
            );
            overflow: hidden; /* Prevents scrollbars from the falling drops */
        }

        /* --- BACKGROUND FUEL DROPS --- */
        .drop {
            position: fixed;
            width: 15px;
            height: 15px;
            background: var(--primary);
            /* This border-radius creates a teardrop shape! */
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            top: -50px;
            z-index: -1; /* Keeps them behind the main card */
            animation: fall linear infinite;
            opacity: 0.6;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3);
        }
        @keyframes fall {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { top: 110%; opacity: 0; }
        }
        /* Position and timing for each drop */
        .drop:nth-child(1) { left: 10%; animation-duration: 3.2s; animation-delay: 0s; }
        .drop:nth-child(2) { left: 20%; animation-duration: 4.1s; animation-delay: 1.5s; width: 10px; height: 10px; }
        .drop:nth-child(3) { left: 85%; animation-duration: 3.8s; animation-delay: 0.5s; }
        .drop:nth-child(4) { left: 92%; animation-duration: 2.9s; animation-delay: 2.2s; width: 18px; height: 18px; }
        .drop:nth-child(5) { left: 5%; animation-duration: 4.5s; animation-delay: 3s; width: 12px; height: 12px; }
        .drop:nth-child(6) { left: 80%; animation-duration: 3.5s; animation-delay: 1.8s; }

        /* --- MAIN CARD --- */
        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            border-top: 5px solid var(--primary); 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
            max-width: 400px;
            width: 100%;
            z-index: 10; /* Keeps card above drops */
        }
        h2 { 
            margin-top: 0; 
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #cbd5e1;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--input-bg);
            border: 2px solid var(--input-border);
            color: var(--text);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1.1rem;
            font-weight: bold;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        #plate {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: monospace;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background-color: var(--input-bg);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid var(--input-border);
        }
        input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: var(--primary);
        }

        /* --- FANCY CALENDAR ANIMATIONS --- */
        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: rgba(16, 185, 129, 0.1); 
            border: 2px solid var(--success); 
            border-radius: 6px;
            display: none; /* Controlled by JS */
            text-align: center;
            transform-origin: top; /* Animates from the top down */
        }
        
        /* The pop-in animation for the whole box */
        @keyframes popIn {
            0% { transform: scaleY(0); opacity: 0; }
            70% { transform: scaleY(1.05); opacity: 1; }
            100% { transform: scaleY(1); opacity: 1; }
        }
        .result.show {
            display: block;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .result-label {
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* The 3D flip animation for the text */
        @keyframes flipText {
            0% { transform: rotateX(-90deg); opacity: 0; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }
        .date-wrapper {
            perspective: 1000px; /* Gives the 3D depth to the flip */
        }
        .date-display {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--success);
            margin: 0.75rem 0;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
            display: inline-block;
        }
        /* Applied by JS every time the date changes */
        .date-display.flip {
            animation: flipText 0.5s ease-out forwards;
        }

        #quotaOutput {
            display: inline-block;
            background-color: var(--primary);
            color: var(--card-bg);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<div class="drop"></div>
<div class="drop"></div>
<div class="drop"></div>
<div class="drop"></div>
<div class="drop"></div>
<div class="drop"></div>

<div class="container">
    <h2>⛽ Fuel Tracker</h2>
    
    <div class="form-group">
        <label for="plate">Vehicle Number Plate</label>
        <input type="text" id="plate" placeholder="WP CAA-1234" autocomplete="off">
    </div>

    <div class="form-group">
        <label for="type">Vehicle Type</label>
        <select id="type">
            <option value="car">Car / Jeep / Van</option>
            <option value="bike">Motorcycle / Scooter</option>
        </select>
    </div>

    <div class="form-group checkbox-group">
        <input type="checkbox" id="refueled">
        <label for="refueled" style="margin: 0; color: var(--text);">Already refueled this week</label>
    </div>

    <div class="result" id="resultBox">
        <div class="result-label">Next Available Date</div>
        <div class="date-wrapper">
            <div class="date-display" id="dateOutput">-</div>
        </div>
        <div id="quotaOutput">Quota: -</div>
    </div>
</div>

<script>
    const plateInput = document.getElementById('plate');
    const typeInput = document.getElementById('type');
    const refueledInput = document.getElementById('refueled');
    const resultBox = document.getElementById('resultBox');
    const dateOutput = document.getElementById('dateOutput');
    const quotaOutput = document.getElementById('quotaOutput');
    plateInput.addEventListener('input', calculateDate);
    typeInput.addEventListener('change', calculateDate);
    refueledInput.addEventListener('change', calculateDate);

    function calculateDate() {
        const plate = plateInput.value.trim();
        const type = typeInput.value;
        const hasRefueled = refueledInput.checked;

        const match = plate.match(/\d(?=[^\d]*$)/);
        
        if (!match) {
            resultBox.classList.remove('show');
            return;
        }

        // Add the 'show' class to trigger the box pop-in animation
        if (!resultBox.classList.contains('show')) {
            resultBox.classList.add('show');
        }

        const lastDigit = parseInt(match[0], 10);
        const isUserOdd = lastDigit % 2 !== 0; 

        let checkDate = new Date(); 
        checkDate.setHours(0, 0, 0, 0); 

        if (hasRefueled) {
            let daysUntilSunday = 7 - checkDate.getDay();
            checkDate.setDate(checkDate.getDate() + daysUntilSunday);
        }

        while (true) {
            const dateNum = checkDate.getDate();
            const isDateOdd = dateNum % 2 !== 0;

            if (isUserOdd === isDateOdd) {
                break;
            }
            checkDate.setDate(checkDate.getDate() + 1);
        }

        const quota = type === 'car' ? '15 Liters' : '5 Liters';
        const options = { weekday: 'long', month: 'short', day: 'numeric' }; 
        const newDateText = checkDate.toLocaleDateString(undefined, options);

        // Only run the text flip animation if the date actually changed or is appearing
        if (dateOutput.textContent !== newDateText) {
            // This trick forces the browser to restart the animation
            dateOutput.classList.remove('flip');
            void dateOutput.offsetWidth; // Trigger reflow
            dateOutput.classList.add('flip');
            
            dateOutput.textContent = newDateText;
        }
        
        quotaOutput.textContent = Allowed Quota: ${quota};
    }
</script>

</body>
</html>
